name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: cargo test
        run: cargo test --workspace
      - name: clippy
        run: cargo clippy --workspace -- -D warnings

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: npm install
        run: npm install
      - name: npm test
        run: npm test
      - name: ui build smoke
        run: npm run build
      - name: vscode extension build smoke
        run: npm run build -w trace
